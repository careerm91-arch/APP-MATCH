<style>

}

select, button{
padding:10px;
margin:10px;

cursor:pointer;

}

<body>
  <img src="PBRIDGE_LOGO_3.png" width="120">
<h2>ASSISTECH FINDER</h2>

<select id="disability">
<option>Vision</option>
<option>Hearing</option>
<option>Mobility</option>
<option>Speech</option>
<option>Cognitive</option>
</select>

<br>

<select id="task">
<option>Reading</option>
<option>Communication</option>
<option>Navigation</option>
<option>Phone Control</option>
<option>Learning</option>
</select>

<br>

<button onclick="startVoice()">🎤 Speak</button>
<p id="voiceStatus"></p>

<br>

<!-- ✅ BUTTON OUTSIDE SCRIPT -->
<button onclick="showResult()">🔒 Unlock Assistive Apps</button>

<div id="result"></div>

<script>

let fullAppsList = [];

// ===== RESULT FUNCTION =====
async function showResult(){

let isPaid = localStorage.getItem("paidUser");

// 🔒 FORCE PAYMENT FIRST
if(isPaid == "yes"){
unlockApps();
return;
}

try{

let url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSpdqK1vK59YwIgtHuYqjrIAmXXLelPIuqFmB4mPMisWlwHZ8ONbdh_YxZ8gu9_XmrC4t5uN0u_atGf/pub?output=csv";

let response = await fetch(url);
let data = await response.text();

let rows = data.trim().split("\n").map(r => r.split(","));

let d = document.getElementById("disability").value;
let t = document.getElementById("task").value;

let output = "";

rows.forEach((r, index) => {

if(index === 0) return;

if(r[0].trim().toLowerCase() === d.toLowerCase() &&
   r[1].trim().toLowerCase() === t.toLowerCase()){

let apps = r.slice(2);
fullAppsList = apps;

output = "<b>All Apps:</b><br>" + apps.join("<br>");

}

});

if(output==""){
output="No results found.";
}

document.getElementById("result").innerHTML = output;

}catch(error){

document.getElementById("result").innerHTML = "Error loading data.";
console.log(error);

}

}
function speak(text){

let msg = new SpeechSynthesisUtterance(text);

msg.lang = "en-IN";

speechSynthesis.speak(msg);

}

// ===== VOICE INPUT =====
function startVoice(){

if (!('webkitSpeechRecognition' in window)) {
alert("Use Chrome browser");
return;
}

const recognition = new webkitSpeechRecognition();
recognition.lang = "en-IN";
recognition.start();

document.getElementById("voiceStatus").innerText = "Listening...";

recognition.onresult = function(event){

let speech = event.results[0][0].transcript.toLowerCase();

document.getElementById("voiceStatus").innerText = speech;

if(speech.includes("vision")) document.getElementById("disability").value="Vision";
if(speech.includes("hearing")) document.getElementById("disability").value="Hearing";
if(speech.includes("mobility")) document.getElementById("disability").value="Mobility";

if(speech.includes("reading")) document.getElementById("task").value="Reading";
if(speech.includes("communication")) document.getElementById("task").value="Communication";
if(speech.includes("navigation")) document.getElementById("task").value="Navigation";

showResult();
};

}

// ===== PAYMENT SCREEN =====
function unlockApps(){ 

let qrHTML = `
<h3>💳 Scan & Pay ₹500</h3>

<img src="qr.png" width="250"><br><br>

<div style="background:#f0f0f0;padding:10px;border-radius:8px;display:inline-block;">
<b>UPI ID:</b><br>
pbridgeconsultancyprivatelimited.eazypay@icici
</div>

<br><br>

<p><b>Enter UTR:</b></p>
<input type="text" id="utr" placeholder="Enter UTR"><br><br>

<button onclick="submitUTR()">Submit Payment</button>

<p id="paymentStatus" style="color:red;"></p>
`;

document.getElementById("result").innerHTML = qrHTML;

}
// ===== VERIFY =====
function verifyPayment(){

let utr = document.getElementById("utr").value.trim();

if(utr.length < 8){
document.getElementById("paymentStatus").innerText = "❌ Invalid UTR";
return;
}

document.getElementById("paymentStatus").innerText = "⏳ Verifying...";

setTimeout(() => {
confirmPayment();
}, 1500);

}

// ===== CONFIRM =====
function confirmPayment(){

localStorage.setItem("paidUser", "yes");

showResult();

}
function submitUTR(){

let utr = document.getElementById("utr").value.trim();

if(utr.length < 8){
document.getElementById("paymentStatus").innerText = "❌ Invalid UTR";
return;
}

// Show admin instruction
document.getElementById("result").innerHTML = `
<h3>⏳ Payment Submitted</h3>

<p>Your UTR: <b>${utr}</b></p>

<p>📩 Send this UTR to Admin via WhatsApp / Email</p>

<p>After verification, you will receive an approval code</p>

<br>

<input type="text" id="adminCode" placeholder="Enter approval code"><br><br>

<button onclick="verifyAdminCode()">Verify Code</button>

<p id="codeStatus" style="color:red;"></p>
`;

}
function verifyAdminCode(){

let code = document.getElementById("adminCode").value.trim();

// ✅ YOU control this code
if(code === "APPROVE123"){

localStorage.setItem("paidUser", "yes");

showPaidApps();
"<h2>✅ Apps Unlocked</h2><br>All Apps Here";//showResult();

}else{

document.getElementById("codeStatus").innerText = "❌ Invalid approval code";

}

}

async function showPaidApps(){

let url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSpdqK1vK59YwIgtHuYqjrIAmXXLelPIuqFmB4mPMisWlwHZ8ONbdh_YxZ8gu9_XmrC4t5uN0u_atGf/pub?output=csv";

let response = await fetch(url);
let data = await response.text();

let rows = data.trim().split("\n").map(r => r.split(","));

let d = document.getElementById("disability").value;
let t = document.getElementById("task").value;

let output = "<h2>✅ Apps Unlocked</h2><br>";

rows.forEach((r,index)=>{

if(index===0) return;

if(
r[0].trim().toLowerCase() === d.toLowerCase() &&
r[1].trim().toLowerCase() === t.toLowerCase()
){

let apps = r.slice(2);

output += apps.join("<br>");

}

});

document.getElementById("result").innerHTML = output;
speak("Apps loaded successfully");
}

</script>
